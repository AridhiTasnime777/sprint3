<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}"/>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-sm bg-dark navbar-dark">
  <a class="navbar-brand" th:href="@{/ListeChansons}">
    <strong>🎵 Gestion Chansons</strong>
  </a>

  <!-- Toggler for mobile -->
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarContent">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarContent">
    <ul class="navbar-nav mr-auto">

      <!-- Chansons Menu -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" id="navChansons"
           role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
          🎶 Chansons
        </a>
        <div class="dropdown-menu" aria-labelledby="navChansons">
          <a class="dropdown-item" th:href="@{/ListeChansons}">📋 Lister</a>
          <div class="dropdown-divider" sec:authorize="hasAnyAuthority('ADMIN', 'AGENT')"></div>
          <a sec:authorize="hasAnyAuthority('ADMIN', 'AGENT')"
             class="dropdown-item" th:href="@{/showCreate}">➕ Ajouter</a>
        </div>
      </li>

      <!-- Recherche Menu -->
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" id="navSearch"
           role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
          🔍 Recherche
        </a>
        <div class="dropdown-menu" aria-labelledby="navSearch">
          <a class="dropdown-item" th:href="@{/rechercheChansons(mode='artiste')}">Par Artiste</a>
          <a class="dropdown-item" th:href="@{/rechercheChansons(mode='artiste-titre')}">Par Artiste et Titre</a>
        </div>
      </li>

    </ul>

    <!-- User Menu (right-aligned) -->
    <ul class="navbar-nav ml-auto">
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" href="#" id="navUser"
           role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
          <!-- Show username when logged in, "Login" when not -->
          <span sec:authorize="isAuthenticated()">
            👤 <strong sec:authentication="name">User</strong>
          </span>
          <span sec:authorize="!isAuthenticated()">🔑 Login</span>
        </a>
        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="navUser">
          <!-- Logged in: show username header + logout -->
          <div sec:authorize="isAuthenticated()" class="dropdown-header text-muted">
            Connecté en tant que :<br>
            <strong sec:authentication="name">User</strong>
          </div>
          <div sec:authorize="isAuthenticated()" class="dropdown-divider"></div>
          <a sec:authorize="isAuthenticated()" class="dropdown-item text-danger"
             th:href="@{/logout}"
             onclick="localStorage.removeItem('jwt'); return true;">
            🚪 Déconnexion
          </a>

          <!-- Not logged in: show login link -->
          <a sec:authorize="!isAuthenticated()" class="dropdown-item" th:href="@{/login}">
            🔑 Se connecter
          </a>
        </div>
      </li>
    </ul>
  </div>
</nav>

<!-- Scripts loaded in fragment so all pages get them -->
<th:block th:fragment="scripts">
  <script th:src="@{/webjars/jquery/3.5.1/jquery.min.js}"></script>
  <script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>
</th:block>

</body>
</html>
