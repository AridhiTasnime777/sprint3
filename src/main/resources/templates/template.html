<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"><body>

<nav th:fragment="navbar" class="navbar navbar-expand-sm bg-dark navbar-dark">
  <a class="navbar-brand" href="#">Gestion Chansons</a>
  <ul class="navbar-nav">
    <li class="nav-item">
      <a class="nav-link" th:href="@{/ListeChansons}">Home</a>
    </li>
    <li class="nav-item dropdown">
      <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">Chansons</a>
      <div class="dropdown-menu">
        <a sec:authorize="hasAnyAuthority('ADMIN', 'AGENT')" class="dropdown-item" th:href="@{/showCreate}">Ajouter</a>
        <a class="dropdown-item" th:href="@{/ListeChansons}">Lister</a>
      </div>
    </li>
  </ul>
  <ul class="navbar-nav ml-auto">
    <li class="nav-item dropdown">
      <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown"><span sec:authentication="name"></span></a>
      <div class="dropdown-menu">
        <a sec:authorize="!isAuthenticated()" class="dropdown-item"
        th:href="@{login}">login</a>
        <a sec:authorize="isAuthenticated()" class="dropdown-item"
        th:href="@{logout}">logout</a>
        <a class="dropdown-item" href="#">Profile</a>
      </div>
    </li>
  </ul>
</nav>

</body>
</html>
