<div class="container mt-5">
    <div class="row justify-content-md-center">
        <div class="col-md-4">
            <div *ngIf="err==1" class="alert alert-danger">
                <strong>Login ou mot de passe erronés..</strong>
            </div>
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="text-center">Connexion</h3>
                </div>
                <div class="card-body">
                    <form>
                        <div class="form-group mb-3">
                            <label class="form-label">Nom Utilisateur :</label>
                            <input type="text" name="username" class="form-control" [(ngModel)]="user.username">
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label">Mot de passe :</label>
                            <input type="password" name="password" [(ngModel)]="user.password" class="form-control">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="button" (click)="onLoggedin()" class="btn btn-primary">Connexion</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
