<div class="container mt-4">
    <div>
        <h2>Modifier une Chanson :</h2>
        @if(debugInfo) { <div class="alert alert-info"><strong>Debug:</strong> {{debugInfo}}</div> }
        @if(errorMessage) { <div class="alert alert-danger"><strong>Error:</strong> {{errorMessage}}</div> }
    </div>
    <form>
        <div class="col-sm-2 col-md-2 col-lg-2">
            <label>ID Chanson</label>
            <input readonly type="text" [(ngModel)]="currentChanson.idChanson" name="idChanson" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Titre de la Chanson</label>
            <input type="text" [(ngModel)]="currentChanson.title" name="title" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Artiste</label>
            <input type="text" [(ngModel)]="currentChanson.artist" name="artist" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Date de Sortie</label>
            <input type="date" [ngModel]="currentChanson.releaseDate | date: 'yyyy-MM-dd'" (ngModelChange)="currentChanson.releaseDate = $event" name="releaseDate" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4 mt-2">
            <label>Album</label>
            <select class="form-control" id="idalb" name="idalb" [(ngModel)]="updatedIdAlb">
                @for(alb of albums; track alb.idalb) {
                    <option [value]="alb.idalb">{{alb.nomAlb}}</option>
                }
            </select>
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4 mt-2">
            <label>Image</label>
            <input type="file" (change)="onImageUpload($event)" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4 mt-2">
            <img [src]="myImage" class="img-fluid" *ngIf="myImage">
        </div>
        <div class="mt-2">
            <button type="submit" (click)="updateChanson()" class="btn btn-success">Modifer</button>
        </div>
    </form>
</div>
