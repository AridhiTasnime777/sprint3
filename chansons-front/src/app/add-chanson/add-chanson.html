<div class="container mt-4">
    <div>
        <h2>Ajouter une Chanson :</h2>
    </div>
    <form>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Titre de la Chanson</label>
            <input type="text" [(ngModel)]="newChanson.title" name="title" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Artiste</label>
            <input type="text" [(ngModel)]="newChanson.artist" name="artist" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Date de Sortie</label>
            <input type="date" [(ngModel)]="newChanson.releaseDate" name="releaseDate" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4 mt-2">
            <label>Album</label>
            <select class="form-control" id="idalb" name="idalb" [(ngModel)]="newIdAlb">
                @for(alb of albums; track alb.idalb) {
                    <option [value]="alb.idalb">{{alb.nomAlb}}</option>
                }
            </select>
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4 mt-2">
            <label>Image</label>
            <input type="file" (change)="onImageUpload($event)" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4 mt-2">
            <img [src]="imagePath" class="img-fluid" *ngIf="imagePath">
        </div>
        <div class="mt-2">
            <button type="submit" (click)="addChanson()" class="btn btn-success">Ajouter</button>
        </div>
    </form>
</div>
